<!DOCTYPE html>
<html>
<head>
    <title>Face Attendance System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .card {
            background: white;
            color: black;
            width: 300px;
            padding: 30px;
            margin: 20px;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        .btn {
            display: block;
            margin-top: 20px;
            padding: 12px;
            background: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #1e3c72;
        }

        footer {
            margin-top: 100px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Face Authentication Attendance System</h1>

        <!-- STUDENT CARD -->
        <div class="card">
            <h2>🎓 Student</h2>
            <p>Mark your attendance using face recognition</p>
            <a href="/attendance" class="btn">Take Attendance</a>
        </div>

        <!-- ADMIN CARD -->
        <div class="card">
            <h2>🔐 Admin</h2>
            <p>Login to manage students and attendance</p>
            <a href="/login" class="btn">Admin Login</a>
        </div>

    </div>

    <footer>
         AI + Cyber Security Project
    </footer>

</body>
</html>
