<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f5f9;
            display: flex;
        }

        /* SIDEBAR (same style as dashboard) */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            background: #1e293b;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }

        .sidebar a:hover {
            background: #3b82f6;
        }

        /* MAIN */
        .main {
            margin-left: 270px;
            width: 100%;
            padding: 30px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }

        .note {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin Panel</h2>

        <a href="/admin">🏠 Dashboard</a>
        <a href="/register">➕ Register Student</a>
        <a href="/logout" style="background:#dc2626;">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="card">

            <h2>Register New Student</h2>

            <form method="POST">

                <input type="text" name="name" placeholder="Enter Student Name" required>

                <input type="text" name="roll" placeholder="Enter Roll Number" required>

                <button type="submit">Start Face Capture</button>

            </form>

            <div class="note">
                Camera will open after submission
            </div>

        </div>

    </div>

</body>
</html>
